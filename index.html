<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>いまどこ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ========== ここにSupabase設定を入力 ========== -->
<script>
  const SUPABASE_URL  = 'https://wyqijmztuvnouuwjvxpp.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5cWlqbXp0dXZub3V1d2p2eHBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjA2MTcsImV4cCI6MjA5MzUzNjYxN30.QNHhSWVwEDqnHYuXeoijIGadm6e0OPg1AqRyDpn3urw';
  const SHARE_PARAM   = 'view'; // 共有URLのパラメータ名
</script>
<!-- ============================================= -->

<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  // URLパラメータで閲覧モードか記録モードか判定
  const urlParams  = new URLSearchParams(location.search);
  const viewUserId = urlParams.get(SHARE_PARAM); // 妻がアクセスしたとき
  const isViewMode = !!viewUserId;

  // 自分のuser_idをlocalStorageで管理
  let myUserId = localStorage.getItem('location_user_id');
  if (!myUserId && !isViewMode) {
    myUserId = 'user_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('location_user_id', myUserId);
  }

  const userId = isViewMode ? viewUserId : myUserId;

  // 現在地を取得して地名に変換し、Supabaseへ保存
  async function recordLocation(isManual = false) {
    if (!navigator.geolocation) {
      updateStatus('GPS非対応ブラウザです', 'red');
      return;
    }
    updateStatus('位置情報を取得中…', 'yellow');
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      updateStatus('地名を変換中…', 'yellow');
      const placeName = await reversGeocode(lat, lng);
      updateStatus('Supabaseに保存中…', 'yellow');
      const { error } = await db.from('locations').insert({
        user_id:     myUserId,
        lat:         lat,
        lng:         lng,
        place_name:  placeName,
        is_manual:   isManual,
        recorded_at: new Date().toISOString()
      });
      if (error) {
        console.error('Supabaseエラー:', error);
        updateStatus('DB保存失敗: ' + (error.message || error.code || JSON.stringify(error)), 'red');
      } else {
        updateStatus('記録済み ✓', 'green');
        loadTodayRecords();
      }
    }, (err) => {
      console.error('GPSエラー:', err);
      const gpsMessages = {
        1: 'GPS許可が拒否されています（ブラウザの設定で許可してください）',
        2: 'GPSで位置が取得できませんでした',
        3: 'GPS取得がタイムアウトしました',
      };
      updateStatus(gpsMessages[err.code] || 'GPS取得エラー: ' + err.message, 'red');
    }, { enableHighAccuracy: true, timeout: 15000 });
  }

  // 緯度経度 → 地名（OpenStreetMap Nominatim・無料・APIキー不要）
  async function reversGeocode(lat, lng) {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja`,
        { headers: { 'Accept-Language': 'ja' } }
      );
      const data = await res.json();
      const a = data.address || {};
      // 区・市・町 + 丁目まで表示
      const parts = [a.city || a.town || a.village || a.county, a.suburb || a.neighbourhood || a.quarter, a.road].filter(Boolean);
      return parts.length > 0 ? parts.join(' ') + '付近' : data.display_name?.split(',')[0] + '付近';
    } catch {
      return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    }
  }

  // 今日の記録を読み込む
  async function loadTodayRecords() {
    const tbodyId  = isViewMode ? 'viewRecordTable'  : 'recordTable';
    const countId  = isViewMode ? 'viewRecordCount'  : 'recordCount';
    const tbody    = document.getElementById(tbodyId);
    const countEl  = document.getElementById(countId);
    if (tbody) tbody.innerHTML = `<tr><td colspan="3" class="text-center py-8 text-gray-400 text-sm">読み込み中…</td></tr>`;

    const selectedDate = document.getElementById('viewDate')?.value;

    let queryStart, queryEnd;
    if (selectedDate) {
      queryStart = selectedDate + 'T00:00:00+09:00';
      queryEnd   = selectedDate + 'T23:59:59+09:00';
    } else {
      const now = new Date();
      const jstNow = new Date(now.getTime() + (9 * 60 + now.getTimezoneOffset()) * 60000);
      const y = jstNow.getFullYear(), m = String(jstNow.getMonth()+1).padStart(2,'0'), d = String(jstNow.getDate()).padStart(2,'0');
      queryStart = `${y}-${m}-${d}T00:00:00+09:00`;
      queryEnd   = `${y}-${m}-${d}T23:59:59+09:00`;
    }

    const { data, error } = await db
      .from('locations')
      .select('*')
      .eq('user_id', userId)
      .gte('recorded_at', queryStart)
      .lte('recorded_at', queryEnd)
      .order('recorded_at', { ascending: true });

    if (error) {
      console.error('データ取得エラー:', error);
      if (tbody) tbody.innerHTML = `<tr><td colspan="3" class="text-center py-6 text-red-400 text-sm">取得失敗: ${error.message || error.code}</td></tr>`;
      return;
    }
    renderTable(data || [], tbody, countEl);
  }

  // テーブルを描画
  function renderTable(rows, tbody, countEl) {
    if (!tbody) return;
    if (countEl) countEl.textContent = rows.length + '件';

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="3" class="text-center py-8 text-gray-400">記録がありません</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r => {
      const dt   = new Date(r.recorded_at);
      const time = dt.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
      const badge = r.is_manual
        ? `<span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">手動</span>`
        : `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">自動</span>`;
      return `
        <tr class="border-b border-gray-100 hover:bg-gray-50">
          <td class="py-3 px-4 text-sm font-mono text-gray-700 whitespace-nowrap">${time}</td>
          <td class="py-3 px-4 text-sm text-gray-800">${r.place_name || '—'}</td>
          <td class="py-3 px-4">${badge}</td>
        </tr>`;
    }).join('');
  }

  // ステータス表示の更新（記録モード用）
  function updateStatus(msg, color) {
    const el = document.getElementById('statusMsg');
    if (!el) return;
    const colors = { green: 'text-green-600', yellow: 'text-yellow-600', red: 'text-red-600', gray: 'text-gray-500' };
    el.className = 'text-sm font-medium ' + (colors[color] || colors.gray);
    el.textContent = msg;
  }

  // 自動記録タイマー（30分ごと）
  let autoTimer = null;
  function startAutoRecord() {
    recordLocation(false); // 起動時に1回すぐ記録
    autoTimer = setInterval(() => recordLocation(false), 30 * 60 * 1000);
    updateStatus('● 記録中（30分ごとに自動保存）', 'green');
  }

  // 共有URLを生成
  function generateShareUrl() {
    const url = location.origin + location.pathname + '?' + SHARE_PARAM + '=' + myUserId;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('shareBtn');
      btn.textContent = '✅ コピーしました';
      setTimeout(() => { btn.textContent = '🔗 記録用のURLをコピー'; }, 2000);
    });
  }

  // ページ読み込み後に初期化
  window.addEventListener('DOMContentLoaded', () => {
    if (isViewMode) {
      initViewMode();
    } else {
      initRecordMode();
    }
  });

  function initRecordMode() {
    document.getElementById('app-record').style.display = 'block';
    document.getElementById('todayDate').textContent = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
    checkSupabaseThenStart();
    loadTodayRecords();
  }

  async function checkSupabaseThenStart() {
    // Supabaseへの接続テスト（locationsテーブルが存在するか確認）
    const { error } = await db.from('locations').select('id').limit(1);
    if (error) {
      updateStatus('Supabase接続エラー: ' + (error.message || error.code), 'red');
      console.error('Supabase接続テスト失敗:', error);
      return;
    }
    // 接続OK → GPS自動記録開始
    startAutoRecord();
  }

  function initViewMode() {
    document.getElementById('app-view').style.display = 'block';
    const dateEl = document.getElementById('viewDate');
    const today = new Date().toISOString().split('T')[0];
    if (dateEl) dateEl.value = today;
    loadTodayRecords();
  }
</script>

<!-- ===== 記録モード（自分用） ===== -->
<div id="app-record" style="display:none" class="max-w-lg mx-auto px-4 py-8">

  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-800">📍 いまどこ</h1>
    <p id="todayDate" class="text-sm text-gray-500 mt-1"></p>
  </div>

  <!-- ステータスと手動ボタン -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-4">
    <div class="flex items-center gap-2 mb-4">
      <span class="pulse-dot inline-block w-2 h-2 rounded-full bg-green-500"></span>
      <span id="statusMsg" class="text-sm font-medium text-green-600">起動中…</span>
    </div>
    <button
      onclick="recordLocation(true)"
      class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors text-base"
    >
      📌 今すぐ記録する
    </button>
  </div>

  <!-- 共有URL -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-4">
    <p class="text-sm text-gray-500 mb-3">このURLを送ると、一覧表が見られます</p>
    <button
      id="shareBtn"
      onclick="generateShareUrl()"
      class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 rounded-xl transition-colors text-sm"
    >
      🔗 記録用のURLをコピー
    </button>
  </div>

  <!-- 今日の記録一覧 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
      <span class="font-medium text-gray-700 text-sm">今日の記録</span>
      <span id="recordCount" class="text-xs text-gray-400">0件</span>
    </div>
    <table class="w-full">
      <thead>
        <tr class="bg-gray-50">
          <th class="py-2 px-4 text-left text-xs text-gray-400 font-medium w-20">時刻</th>
          <th class="py-2 px-4 text-left text-xs text-gray-400 font-medium">場所</th>
          <th class="py-2 px-4 text-left text-xs text-gray-400 font-medium w-16"></th>
        </tr>
      </thead>
      <tbody id="recordTable">
        <tr><td colspan="3" class="text-center py-8 text-gray-400 text-sm">取得中…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- ===== 閲覧モード（記録用） ===== -->
<div id="app-view" style="display:none" class="max-w-lg mx-auto px-4 py-8">

  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-800">📋 行動履歴</h1>
    <p class="text-xs text-gray-400 mt-1">👀 閲覧専用</p>
  </div>

  <!-- 日付選択 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
    <label class="text-sm text-gray-500 block mb-2">日付を選ぶ</label>
    <input
      type="date"
      id="viewDate"
      onchange="loadTodayRecords()"
      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-300"
    />
  </div>

  <!-- 記録一覧 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
      <span class="font-medium text-gray-700 text-sm">行動履歴</span>
      <span id="viewRecordCount" class="text-xs text-gray-400">0件</span>
    </div>
    <table class="w-full">
      <thead>
        <tr class="bg-gray-50">
          <th class="py-2 px-4 text-left text-xs text-gray-400 font-medium w-20">時刻</th>
          <th class="py-2 px-4 text-left text-xs text-gray-400 font-medium">場所</th>
          <th class="py-2 px-4 text-left text-xs text-gray-400 font-medium w-16"></th>
        </tr>
      </thead>
      <tbody id="viewRecordTable">
        <tr><td colspan="3" class="text-center py-8 text-gray-400 text-sm">取得中…</td></tr>
      </tbody>
    </table>
  </div>

</div>

</body>
</html>
